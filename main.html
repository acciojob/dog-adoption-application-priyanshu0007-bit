<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }

        form {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        input[type="checkbox"] {
            width: auto;
        }

        input[type="submit"] {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <form>
        <input id="name" name="name" type="text" placeholder="Name">

        <input id="phone" name="phone" type="text" placeholder="Phone Number">

        <input id="address" name="address" type="text" placeholder="Address">

        <input id="checkbox" name="checkbox" type="checkbox"
            value="Have you ever lived with a Dog before?">
        <label for="checkbox">Have you ever lived with a Dog before?</label>

        <br><br>

        <label for="multiSelect">Please select your preferred breeds</label>

        <select id="multiSelect" name="multiSelect" multiple>
            <option value="Labrador">Labrador</option>
            <option value="Pug">Pug</option>
            <option value="German Shepherd">German Shepherd</option>
        </select>

        <input id="submit" type="submit" value="Submit">
    </form>

    <script src="./script.js"></script>

</body>

</html>
